<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bidus Auto | Vehicle Details</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  
  <header class="site-header">
  <div class="container header-inner">
    <a class="logo" href="./index.html">
      <span class="logo-badge">BA</span>
      <span class="logo-text">Bidus Auto Auctions</span>
    </a>

    <nav class="main-nav" id="mainNav">
      <a href="./index.html">Home</a>
      <a href="./collection.html">Auctions</a>
      <a href="./index.html#featured">Featured</a>
      <a href="./index.html#how-bidding-works">How Bidding Works</a>
    </nav>

    <div class="header-actions">
      <a class="btn btn-primary desktop-browse-btn" href="./collection.html">Browse Auctions</a>

      <button
        class="menu-toggle"
        id="menuToggle"
        type="button"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="mobileMenu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <div class="mobile-menu" id="mobileMenu">
    <div class="container mobile-menu-inner">
      <a href="./index.html">Home</a>
      <a href="./collection.html">Auctions</a>
      <a href="./index.html#featured">Featured</a>
      <a href="./index.html#how-bidding-works">How Bidding Works</a>
      <a class="btn btn-primary mobile-menu-btn" href="./collection.html">Browse Auctions</a>
    </div>
  </div>
</header>

  <section class="section vehicle-page-section">
    <div class="container">
      <div id="vehicleDetail" class="vehicle-detail-wrap">
        <div class="loading-card">Loading vehicle...</div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 Bidus Auto Auctions. All rights reserved.</p>
      <div class="footer-links">
        <a href="./index.html">Home</a>
        <a href="./collection.html">Auctions</a>
      </div>
    </div>
  </footer>

  <script src="./public/assets/js/product.js"></script>
  <script>
  const menuToggle = document.getElementById('menuToggle');
  const mobileMenu = document.getElementById('mobileMenu');

  if (menuToggle && mobileMenu) {
    menuToggle.addEventListener('click', () => {
      const isOpen = mobileMenu.classList.toggle('open');
      menuToggle.classList.toggle('open');
      menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    mobileMenu.querySelectorAll('a').forEach((link) => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        menuToggle.classList.remove('open');
        menuToggle.setAttribute('aria-expanded', 'false');
      });
    });
  }
</script>
</body>
</html>
